name = "github-lines-api"
main = "src/index.ts"
compatibility_date = "2026-05-01"

# Tunables (read as env.* strings in the Worker)
[vars]
# How long a cached snapshot is considered fresh before re-fetching from GitHub.
CACHE_TTL_HOURS = "24"
# Max number of (own, non-fork) repos to scan for line counts per refresh.
# Each repo costs 1-2 subrequests; the Workers free plan allows 50 per request,
# the paid plan 1000. Raise this on the paid plan for more complete line totals.
MAX_REPOS = "15"
# Whether to include forked repos when counting lines ("true"/"false").
INCLUDE_FORKS = "false"

# KV namespace for per-user stat snapshots.
# Create with:  npx wrangler kv namespace create STATS
# then paste the returned id below.
[[kv_namespaces]]
binding = "STATS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# GITHUB_TOKEN is a secret, NOT a var. Set it with:
#   npx wrangler secret put GITHUB_TOKEN
